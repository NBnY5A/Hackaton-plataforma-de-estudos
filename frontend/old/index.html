<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tarefas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="tarefas">
      <h1>Tarefas</h1>

      <div class="nova-tarefa">
        <label for="titulo">Titulo</label>
        <input type="text" placeholder="titulo" name="titulo" />
        <label for="descricao">Descricao</label>
        <input type="text" placeholder="descricao" name="descricao" />
        <label for="categorias">Categoria</label>
        <input type="text" placeholder="categoria" name="categoria" />
        <button class="btn-nova-tarefa">Criar nova tarefa</button>
      </div>

      <div class="lista-tarefas">
        <div class="tarefa-item">
          <div class="tarefa-tit-desc">
            <div class="tarefa-titulo">
              <p class="p-titulo">Tarefa 1</p>
            </div>
            <div class="tarefa-descricao">
              <p class="p-descricao">Descricao Tarefa 1</p>
            </div>
          </div>

          <div class="tarefa-categoria">
            <p class="p-categoria">Categoria 1</p>
          </div>
        </div>

        <div class="tarefa-item">
          <div class="tarefa-tit-desc">
            <div class="tarefa-titulo">
              <p class="p-titulo">Tarefa 2</p>
            </div>
            <div class="tarefa-descricao">
              <p class="p-descricao">Descricao Tarefa 2</p>
            </div>
          </div>

          <div class="tarefa-categoria">
            <p class="p-categoria">Categoria 2</p>
          </div>
        </div>

        <div class="tarefa-item">
          <div class="tarefa-tit-desc">
            <div class="tarefa-titulo">
              <p class="p-titulo">Tarefa 3</p>
            </div>
            <div class="tarefa-descricao">
              <p class="p-descricao">Descricao Tarefa 3</p>
            </div>
          </div>

          <div class="tarefa-categoria">
            <p class="p-categoria">Categoria 3 aaaaa aaaaa aaaaa aaaaa aaaaa</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
